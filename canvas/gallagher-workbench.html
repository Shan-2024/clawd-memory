<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>The Gallagher's</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --coal: #1a1a1a;
            --soot: #0d0d0d;
            --rust: #8b4513;
            --beer: #d4a574;
            --caution: #c41e3a;
            --paper: #f5f0e6;
            --concrete: #4a4a4a;
            --grime: #2d2d2d;
        }

        body {
            font-family: 'Courier New', monospace;
            background: var(--soot);
            color: var(--paper);
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* 左侧菜单栏 */
        .sidebar {
            width: 220px;
            background: var(--coal);
            border-right: 3px solid var(--rust);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,0.1) 2px,
                    rgba(0,0,0,0.1) 4px
                );
            pointer-events: none;
        }

        .logo {
            padding: 30px 20px;
            border-bottom: 2px solid var(--rust);
            text-align: center;
        }

        .logo h1 {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--caution);
            text-transform: uppercase;
        }

        .logo span {
            font-size: 10px;
            color: var(--concrete);
            letter-spacing: 1px;
        }

        .character-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .character-item {
            padding: 15px 20px;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .character-item:hover {
            background: var(--grime);
            border-left-color: var(--beer);
        }

        .character-item.active {
            background: var(--grime);
            border-left-color: var(--caution);
        }

        .character-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .character-name {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 右侧内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--soot);
        }

        .header {
            height: 70px;
            background: var(--coal);
            border-bottom: 2px solid var(--rust);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .header-title {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .header-subtitle {
            font-size: 11px;
            color: var(--concrete);
            letter-spacing: 1px;
        }

        /* 应用矩阵 */
        .app-grid {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 25px;
        }

        .app-card {
            aspect-ratio: 1;
            background: var(--coal);
            border: 2px solid var(--concrete);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--character-color, var(--rust));
        }

        .app-card:hover {
            border-color: var(--beer);
            transform: translateY(-4px);
        }

        .app-icon {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-icon svg {
            width: 100%;
            height: 100%;
            fill: var(--paper);
        }

        .app-name {
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
            color: var(--paper);
        }

        .app-desc {
            font-size: 10px;
            color: var(--concrete);
            text-align: center;
            max-width: 120px;
        }

        /* 应用详情页 */
        .app-detail {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        .app-detail.active {
            display: flex;
        }

        .detail-header {
            height: 60px;
            background: var(--coal);
            border-bottom: 2px solid var(--rust);
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 20px;
        }

        .back-btn {
            padding: 8px 16px;
            background: var(--grime);
            border: 1px solid var(--concrete);
            color: var(--paper);
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .back-btn:hover {
            border-color: var(--beer);
        }

        .detail-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--coal);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--rust);
        }
    </style>
</head>

            dollar: `<svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="20" stroke="currentColor" stroke-width="2" fill="none"/><text x="30" y="36" text-anchor="middle" font-size="20" fill="currentColor">$</text></svg>`,
            crown: `<svg viewBox="0 0 60 60"><path d="M10 40L18 20L30 30L42 20L50 40H10Z" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="18" cy="18" r="3" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="30" cy="25" r="3" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="42" cy="18" r="3" stroke="currentColor" stroke-width="2" fill="none"/></svg>`,
            chart: `<svg viewBox="0 0 60 60"><rect x="10" y="35" width="10" height="17" stroke="currentColor" stroke-width="2" fill="none"/><rect x="25" y="20" width="10" height="32" stroke="currentColor" stroke-width="2" fill="none"/><rect x="40" y="8" width="10" height="44" stroke="currentColor" stroke-width="2" fill="none"/></svg>`,
            cash: `<svg viewBox="0 0 60 60"><rect x="8" y="20" width="44" height="20" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="30" cy="30" r="6" stroke="currentColor" stroke-width="2" fill="none"/></svg>`,
            people: `<svg viewBox="0 0 60 60"><circle cx="20" cy="16" r="6" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="40" cy="16" r="6" stroke="currentColor" stroke-width="2" fill="none"/><path d="M10 40C10 32 14 26 20 26C26 26 30 32 30 40" stroke="currentColor" stroke-width="2" fill="none"/><path d="M30 40C30 32 34 26 40 26C46 26 50 32 50 40" stroke="currentColor" stroke-width="2" fill="none"/></svg>`
        };

        let currentCharacter = 'frank';

        // 初始化
        function init() {
            renderApps(currentCharacter);
            setupEventListeners();
        }

        // 渲染应用网格
        function renderApps(charId) {
            const char = characters[charId];
            document.getElementById('currentChar').textContent = char.name;
            document.getElementById('currentQuote').textContent = char.quote;
            
            const grid = document.getElementById('appGrid');
            grid.innerHTML = '';
            
            char.apps.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card';
                card.style.setProperty('--character-color', char.color);
                card.onclick = () => openApp(charId, app.id);
                
                card.innerHTML = `
                    <div class="app-icon">${icons[app.icon] || icons.beer}</div>
                    <div class="app-name">${app.name}</div>
                    <div class="app-desc">${app.desc}</div>
                `;
                
                grid.appendChild(card);
            });
        }

        // 设置事件监听
        function setupEventListeners() {
            document.querySelectorAll('.character-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.character-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    currentCharacter = item.dataset.character;
                    renderApps(currentCharacter);
                });
            });
        }

        // 打开应用
        function openApp(charId, appId) {
            const char = characters[charId];
            const app = char.apps.find(a => a.id === appId);
            
            document.getElementById('gridView').style.display = 'none';
            document.getElementById('detailView').classList.add('active');
            document.getElementById('detailTitle').textContent = app.name;
            
            // 这里可以根据不同应用渲染不同内容
            document.getElementById('detailContent').innerHTML = `
                <div style="text-align: center; padding: 60px; color: var(--concrete);">
                    <div style="width: 100px; height: 100px; margin: 0 auto 30px;">${icons[app.icon]}</div>
                    <h2 style="color: var(--paper); margin-bottom: 20px;">${app.name}</h2>
                    <p>${app.desc}</p>
                    <p style="margin-top: 40px; font-size: 12px;">[ Application under construction ]</p>
                </div>
            `;
        }

        // 返回网格
        function backToGrid() {
            document.getElementById('detailView').classList.remove('active');
            document.getElementById('gridView').style.display = 'flex';
        }

        // 启动
        init();
    </script>
</body>
</html>
