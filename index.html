<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Gallagher's</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Design Tokens (White Theme) ───────────────────────────────── */
    :root {
      --bg:        #FAFAF9;
      --bg-2:      #FFFFFF;
      --bg-3:      #F5F5F4;
      --bg-4:      #E7E5E4;
      --bg-5:      #D6D3D1;
      --accent:    #C84B26;
      --acc-2:     #A83B1C;
      --acc-dim:   #E05A35;
      --acc-lo:    rgba(200,75,38,0.08);
      --acc-mid:   rgba(200,75,38,0.15);
      --acc-hi:    rgba(200,75,38,0.25);
      --gold:      #B8924A;
      --gold-dim:  #9A7B3D;
      --text:      #1C1917;
      --text-2:    #57534E;
      --text-3:    #A8A29E;
      --border:    rgba(28,25,23,0.08);
      --border-hi: rgba(28,25,23,0.15);
      --border-lo: rgba(28,25,23,0.04);
      --r-sm:      8px;
      --r-md:      12px;
      --r-lg:      16px;
      --sw:        248px;
      --th:        62px;
      --ease:      cubic-bezier(0.2, 0, 0, 1);
    }

    /* ─── Base ──────────────────────────────────────────────────────── */
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Layout Shell ───────────────────────────────────────────────── */
    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ─── Top Bar ────────────────────────────────────────────────────── */
    .topbar {
      height: var(--th);
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px 0 20px;
      gap: 0;
      flex-shrink: 0;
      position: relative;
      z-index: 20;
    }

    .topbar-brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .brand-wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 3.5px;
      color: var(--text);
      line-height: 1;
    }

    .brand-location {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      color: var(--gold-dim);
      text-transform: uppercase;
    }

    .topbar-sep {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 20px;
      flex-shrink: 0;
    }

    .topbar-tagline {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-3);
      letter-spacing: 0.2px;
      font-style: italic;
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22C55E;
      box-shadow: 0 0 0 0 rgba(34,197,94,0.4);
      animation: pulse-ring 2.5s ease-out infinite;
    }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      70%  { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    .topbar-status-txt {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: 0.3px;
    }

    /* ─── Body Wrap ──────────────────────────────────────────────────── */
    .body-wrap {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Sidebar ────────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sw);
      background: var(--bg-2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .sidebar::-webkit-scrollbar { display: none; }

    .sidebar-group-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 18px 16px 7px;
    }

    .sidebar-group-label span {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3.5px;
      color: var(--text-3);
      text-transform: uppercase;
    }

    .sidebar-group-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-lo);
    }

    .char-item {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 10px 16px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 200ms var(--ease),
                  border-color 200ms var(--ease);
      position: relative;
      min-height: 44px;
    }

    .char-item:hover {
      background: var(--bg-3);
      border-left-color: var(--acc-dim);
    }

    .char-item.active {
      background: var(--bg-4);
      border-left-color: var(--accent);
    }

    .char-idx {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-3);
      letter-spacing: 0.5px;
      margin-top: 3px;
      min-width: 16px;
      font-variant-numeric: tabular-nums;
      transition: color 200ms var(--ease);
    }

    .char-item.active .char-idx,
    .char-item:hover .char-idx {
      color: var(--accent);
    }

    .char-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex: 1;
      min-width: 0;
    }

    .char-firstname {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px;
      letter-spacing: 1.5px;
      color: var(--text-2);
      line-height: 1;
      transition: color 200ms var(--ease);
    }

    .char-item.active .char-firstname,
    .char-item:hover .char-firstname {
      color: var(--text);
    }

    .char-lastname {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--text-3);
      text-transform: uppercase;
      transition: color 200ms var(--ease);
    }

    .char-item.active .char-lastname {
      color: var(--acc-2);
    }

    .char-tagline {
      font-size: 9.5px;
      font-weight: 400;
      color: var(--text-3);
      font-style: italic;
      margin-top: 3px;
      line-height: 1.4;
    }

    .char-pill {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      border-radius: 100px;
      background: var(--accent);
      color: #fff;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-top: 3px;
      opacity: 0;
      transition: opacity 200ms var(--ease);
      flex-shrink: 0;
    }

    .char-item.active .char-pill,
    .char-item:hover .char-pill {
      opacity: 1;
    }

    .char-item[data-count="0"] .char-pill {
      display: none;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 14px 16px;
      border-top: 1px solid var(--border-lo);
    }

    .sidebar-footer p {
      font-size: 9px;
      font-weight: 400;
      color: var(--text-3);
      line-height: 1.7;
      letter-spacing: 0.3px;
    }

    /* ─── Main Content ───────────────────────────────────────────────── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 48px 52px 64px;
      scrollbar-width: thin;
      scrollbar-color: var(--bg-4) transparent;
    }

    .main::-webkit-scrollbar { width: 3px; }
    .main::-webkit-scrollbar-thumb {
      background: var(--bg-5);
      border-radius: 2px;
    }

    /* ─── Character Hero ─────────────────────────────────────────────── */
    .char-hero {
      margin-bottom: 44px;
      animation: fade-up 280ms var(--ease) both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .hero-eyebrow-line {
      width: 24px;
      height: 1px;
      background: var(--accent);
    }

    .hero-eyebrow-txt {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .hero-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 68px;
      letter-spacing: 5px;
      line-height: 0.92;
      color: var(--text);
      margin-bottom: 18px;
    }

    .hero-quote {
      display: flex;
      gap: 14px;
      max-width: 580px;
    }

    .hero-quote-bar {
      width: 2px;
      background: var(--acc-dim);
      border-radius: 1px;
      flex-shrink: 0;
      margin: 2px 0;
    }

    .hero-quote-txt {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-2);
      font-style: italic;
      line-height: 1.65;
      letter-spacing: 0.1px;
    }

    .hero-rule {
      height: 1px;
      background: var(--border);
      margin-top: 32px;
    }

    /* ─── Section Label ──────────────────────────────────────────────── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--text-3);
      text-transform: uppercase;
      margin-bottom: 20px;
      margin-top: 32px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-lo);
    }

    /* ─── App Grid ───────────────────────────────────────────────────── */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(232px, 1fr));
      gap: 14px;
      animation: fade-up 300ms var(--ease) 60ms both;
    }

    /* ─── App Card ───────────────────────────────────────────────────── */
    .app-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 22px 20px 18px;
      cursor: pointer;
      transition: background 200ms var(--ease),
                  border-color 200ms var(--ease),
                  box-shadow 200ms var(--ease),
                  transform 200ms var(--ease);
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
      min-height: 44px;
    }

    .app-card:hover {
      background: var(--bg-2);
      border-color: var(--border-hi);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    }

    .app-card:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .app-card.coming-soon {
      cursor: default;
      opacity: 0.5;
      border-style: dashed;
    }

    .app-card.coming-soon:hover {
      background: var(--bg-2);
      border-color: var(--border);
      transform: none;
      box-shadow: none;
    }

    /* Arrow indicator */
    .card-arrow {
      position: absolute;
      right: 18px;
      top: 18px;
      color: var(--text-3);
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 200ms var(--ease),
                  transform 200ms var(--ease);
      display: flex;
      align-items: center;
    }

    .app-card:not(.coming-soon):hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* Icon wrapper */
    .app-icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: var(--r-sm);
      background: var(--acc-lo);
      border: 1px solid rgba(200,75,38,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      flex-shrink: 0;
      transition: background 200ms var(--ease),
                  border-color 200ms var(--ease);
    }

    .app-card.coming-soon .app-icon-wrap {
      color: var(--text-3);
      background: var(--bg-3);
      border-color: var(--border-lo);
    }

    .app-card:not(.coming-soon):hover .app-icon-wrap {
      background: var(--acc-mid);
      border-color: rgba(200,75,38,0.35);
    }

    /* Card text */
    .app-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      letter-spacing: 0.1px;
      padding-right: 22px;
    }

    .app-desc {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-2);
      line-height: 1.6;
      flex: 1;
    }

    /* Status badge */
    .app-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 3px 8px 3px 7px;
      border-radius: 100px;
      width: fit-content;
      margin-top: 2px;
    }

    .app-badge.live {
      background: rgba(200,75,38,0.10);
      color: var(--accent);
      border: 1px solid rgba(200,75,38,0.18);
    }

    .app-badge.live::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    .app-badge.soon {
      background: var(--bg-3);
      color: var(--text-3);
      border: 1px solid var(--border-lo);
    }

    /* ─── Empty State ────────────────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      padding: 52px 8px;
      animation: fade-up 300ms var(--ease) 80ms both;
    }

    .empty-icon-wrap {
      width: 52px;
      height: 52px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      margin-bottom: 4px;
    }

    .empty-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.1px;
    }

    .empty-desc {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-3);
      line-height: 1.6;
      max-width: 280px;
    }
  </style>
</head>

// ─── State ────────────────────────────────────────────────────────────
let activeId = 'frank';

// ─── Helpers ──────────────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }

// ─── Render Sidebar ───────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('char-list');
  const groups = [
    { key: 'family', label: 'Family' },
    { key: 'crew',   label: 'South Side' },
  ];

  let html = '';
  let idx = 0;
  groups.forEach(g => {
    const members = CHARS.filter(c => c.group === g.key);
    if (!members.length) return;
    html += `<div class="sidebar-group-label"><span>${g.label}</span></div>`;
    members.forEach(c => {
      idx++;
      html += `
        <div class="char-item ${c.id === activeId ? 'active' : ''}"
             data-count="${c.apps.length}"
             onclick="selectChar('${c.id}')">
          <span class="char-idx">${pad(idx)}</span>
          <div class="char-info">
            <span class="char-firstname">${c.firstName}</span>
            <span class="char-lastname">${c.lastName}</span>
            <span class="char-tagline">${c.tagline}</span>
          </div>
          <span class="char-pill">${c.apps.length}</span>
        </div>
      `;
    });
  });

  list.innerHTML = html;
}

// ─── Render Main ──────────────────────────────────────────────────────
function renderMain(char) {
  const main = document.getElementById('main-content');

  let appsHTML = '';

  if (char.apps.length > 0) {
    appsHTML = char.apps.map(app => `
      <div class="app-card"
           role="button"
           tabindex="0"
           onclick="openApp('${app.page}', '${app.name}')"
           onkeydown="if(event.key==='Enter') openApp('${app.page}','${app.name}')">
        <div class="card-arrow">${IC.arrowRight}</div>
        <div class="app-icon-wrap">${IC[app.icon] || IC.plus}</div>
        <div class="app-name">${app.name}</div>
        <div class="app-desc">${app.desc}</div>
        <div class="app-badge ${app.status === 'live' ? 'live' : 'soon'}">
          ${app.status === 'live' ? 'Available' : 'Coming Soon'}
        </div>
      </div>
    `).join('');
  } else {
    appsHTML = `
      <div class="empty-state">
        <div class="empty-icon-wrap">${IC.wrench}</div>
        <div class="empty-title">Under Construction</div>
        <div class="empty-desc">Something's being built. South Side doesn't rush for anyone.</div>
      </div>
    `;
  }

  main.innerHTML = `
    <div class="char-hero">
      <div class="hero-eyebrow">
        <div class="hero-eyebrow-line"></div>
        <span class="hero-eyebrow-txt">Character · The Gallagher's</span>
      </div>
      <div class="hero-name">${char.firstName}<br>${char.lastName}</div>
      <div class="hero-quote">
        <div class="hero-quote-bar"></div>
        <p class="hero-quote-txt">${char.quote}</p>
      </div>
      <div class="hero-rule"></div>
    </div>
    <div class="section-label">${char.apps.length > 0 ? `${char.firstName}'s Tools` : 'Tools'}</div>
    <div class="apps-grid">${appsHTML}</div>
  `;
}

// ─── Select Character ─────────────────────────────────────────────────
function selectChar(id) {
  activeId = id;
  const char = CHARS.find(c => c.id === id);
  renderSidebar();
  renderMain(char);
  document.getElementById('main-content').scrollTop = 0;
}

// ─── Open App ─────────────────────────────────────────────────────────
function openApp(page, name) {
  // TODO: navigate to sub-page
  console.log('Opening:', page);
}

// ─── Init ─────────────────────────────────────────────────────────────
renderSidebar();
renderMain(CHARS.find(c => c.id === activeId));
</script>
